# fly.toml app configuration file generated for davey-capital-mcp on 2026-06-12T20:15:24-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'davey-capital-mcp'
primary_region = 'iad'

[build]
  dockerfile = 'mcp_server/Dockerfile'

[env]
  DAVEY_ROOT = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = 'davey_data'
  destination = '/data'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
